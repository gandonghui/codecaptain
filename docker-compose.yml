services:
  codecaptain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codecaptain
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/codecaptain:/home/codecaptain/.config/codecaptain
      - ./data/opencode/share:/home/codecaptain/.local/share/opencode
      - ./data/opencode/state:/home/codecaptain/.local/state/opencode
      - ./data/opencode/config:/home/codecaptain/.config/opencode
      - ./data/ssh:/home/codecaptain/.ssh
      - ./workspaces:/home/codecaptain/workspaces
    environment:
      # Docker binds CodeCaptain to 0.0.0.0 for port mapping, so UI auth is required.
      # Set this before starting, for example:
      #   CODECAPTAIN_UI_PASSWORD="$(openssl rand -base64 24)" docker compose up -d
      CODECAPTAIN_UI_PASSWORD: ${CODECAPTAIN_UI_PASSWORD:?Set CODECAPTAIN_UI_PASSWORD before exposing CodeCaptain through Docker}
    # CODECAPTAIN_HOST: 0.0.0.0  # Bind address (default in Docker entrypoint: 0.0.0.0)
    # CODECAPTAIN_TUNNEL_PROVIDER: cloudflare
    # CODECAPTAIN_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # CODECAPTAIN_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # CODECAPTAIN_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # CODECAPTAIN_TUNNEL_CONFIG: /home/codecaptain/.cloudflared/config.yml  # optional for managed-local
    # OH_MY_OPENCODE: true # enable oh-my-opencode
    # OPENCODE_HOST: http://172.17.0.1:4096 # Connect to external OpenCode server
    # OPENCODE_SKIP_START: true # skip start opencode
    # CODECAPTAIN_OPENCODE_HOSTNAME: 0.0.0.0 # Bind OpenCode to all interfaces
    restart: unless-stopped
