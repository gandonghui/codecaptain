  <text x="4.5" y="14" fill="#E8E4F0" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11" text-anchor="start">Created with</text>
  <!-- Medcaptain icon mark (simplified for badge) -->
  <g transform="translate(108 4) scale(0.3)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#E8E4F0"/>
    <rect x="1" y="1" width="6.5" height="6.5" fill="#5C31C4"/>
    <rect x="8.5" y="1" width="6.5" height="6.5" rx="0 3 0 0" fill="#5C31C4"/>
    <rect x="1" y="8.5" width="6.5" height="6.5" fill="#5C31C4"/>
    <rect x="8.5" y="8.5" width="6.5" height="6.5" fill="#5C31C4"/>
